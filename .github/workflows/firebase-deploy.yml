# Deploy Firestore rules/indexes and Cloud Functions when backend config changes.
# Add repository secret: FIREBASE_TOKEN (from `firebase login:ci` on a machine with deploy access).

name: Deploy Firebase

on:
  push:
    branches: [main]
    paths:
      - "firestore.rules"
      - "firestore.indexes.json"
      - "functions/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/firebase-deploy.yml"
  workflow_dispatch:

concurrency:
  group: firebase-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install and build Cloud Functions
        working-directory: functions
        run: |
          npm ci
          npm run build

      - name: Deploy Firestore and Functions
        run: firebase deploy --only firestore,functions --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
